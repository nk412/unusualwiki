<!DOCTYPE html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bellefair&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <meta charSet="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Unusual Wikipedia</title>
    <style>
      body {
          max-width: 40%;
          margin: 7% auto;
          padding-left: 0%;
          padding-right: 25%;
          text-align: left;
          font-family: 'Bellefair', serif;
          font-size: 22px;
          color: #232b2b;
          background-color: #F4F1EC;
      }
      hr { background-color: #BBBBBB;
           height: 1px;
           border: 0;
           padding: 0;
           margin-top: 3em;
           margin-bottom: 0em;
      }
      a { color: #9E3A2A; }
      a:hover { color: #232b2b; }
      h1 { font-family: 'DM Serif Display', serif; font-size: 56px;}
      h2 { font-family: monospace; font-size: 14px;
           font-weight: lighter; color: #BBBBBB; margin-top: 0.1em; margin-bottom: 3em}
      .desc { font-size: 36px; text-align: justify;}
      @media (max-width: 800px) {
        body {
           max-width: 90%;
           padding-left: 5%;
           padding-right: 5%;
           font-size: 22px;
        }
        h1 { font-size: 48px;}
        .desc { font-size: 28px; }
      }

    </style>
  </head>
  <body>

    <h1 id="heading">&nbsp;</h1>
    <div class="desc" id="desc">&nbsp;</div>

    <hr>
    <h2>// <i>Unusual</i> Articles on Wikipedia</h2>

    <a href="#" id="another">Show me another!</a>
    <span style="float:right;"><a href="about.html">About</a><br></span>

    <script>
      let articles = [];

      function pick() {
        if (!articles.length) return;
        const a = articles[Math.floor(Math.random() * articles.length)];
        document.getElementById('heading').innerHTML =
          `<a href="${a.url}">${a.title}</a>`;
        document.getElementById('desc').textContent = a.desc;
      }

      document.getElementById('another').addEventListener('click', (e) => {
        e.preventDefault();
        pick();
      });

      fetch('wiki.json')
        .then(r => r.json())
        .then(data => { articles = data.articles; pick(); });
    </script>

  </body>
</html>
